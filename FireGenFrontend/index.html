<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Incident Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
        }
        .table-container {
            background-color: #1c1c1c;
            padding: 10px;
            border-radius: 8px;
        }
        table {
            border-collapse: collapse;
            table-layout: fixed;
        }
        thead th {
            background-color: #444444 !important;
            color: #e0e0e0 !important;
        }
        tbody td {
            background-color: #1c1c1c;
            white-space: nowrap;   /* Prevent wrapping */
            overflow: hidden;      /* Hide content that exceeds cell width */
            text-overflow: clip;   /* Simply cut off excess text */
        }
        .row-new td {
            color: #84c1ff !important; /* Darker blue for the whole row */
            background-color: #1c1c1c;
        }
        .row-resolved td {
            color: #4b7094 !important; /* Darker blue for the whole row */
            background-color: #1c1c1c;
        }
        .row-default td {
            color: #36de5d !important; /* Green for the whole row */
            background-color: #1c1c1c;
        }
        .result-box {
            margin-bottom: 10px;
            padding: 8px 12px;
            background-color: #2c2c2c;
            border-radius: 5px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="result-box" id="resultBox">Loading page...</div>

<div class="table-container">
    <table class="table table-borderless" id="dataTable">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<script>

const columns = [
    {"json": "location.venue", "name": "Venue"},
    {"json": "incidentType", "name": "Call Type"},
    {"json": "incidentPriority", "name": "Priority"},
    {"json": "location.shownValue", "name": "Location"},
    {"json": "location.commonName", "name": "Common Name"},
    {"json": "created", "name": "Date / Time"},
    {"json": "fullId", "name": "Incident Number"}
]

function getNestedValue(obj, path) {
    return path.split('.').reduce((o, key) => (o ? o[key] : undefined), obj);
}

async function loadTable() {
    try {
        // Replace this URL with your API
        const response = await fetch("http://localhost:8080/api/v1/incidents");
        const json = await response.json();
        const data = json.message || [];

        const table = document.getElementById("dataTable");
        const thead = table.querySelector("thead");
        const tbody = table.querySelector("tbody");
        const resultBox = document.getElementById("resultBox");

        // Clear previous data
        thead.innerHTML = "";
        tbody.innerHTML = "";

        // Update result box
        const now = new Date().toLocaleTimeString();
        resultBox.textContent = `Result: ${data.length == undefined ? "0" : data.length} items returned from server at ${now}`;

        // Create table headers
        const headerRow = document.createElement("tr");
        columns.forEach(col => {
            const th = document.createElement("th");
            th.textContent = col.name;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        // Create table rows
        data.forEach(item => {
            const row = document.createElement("tr");
            var statusClass = "row-default";
            switch (item.incidentStatus) {
                case "NEW":
                    statusClass = "row-new";
                    break;
                case "RESOLVED":
                    statusClass = "row-resolved";
                    break;
            }
            row.classList.add(statusClass);

            columns.forEach(col => {
                const td = document.createElement("td");
                let value = getNestedValue(item, col.json);
                if (typeof value === "object") value = JSON.stringify(value);
                td.textContent = value !== undefined ? value : '';
                row.appendChild(td);
            });

            tbody.appendChild(row);
        });
        
        // // Table headers
        // const headers = Object.keys(data[0]);
        // const headerRow = document.createElement("tr");
        // headers.forEach(key => {
        //     const th = document.createElement("th");
        //     th.textContent = key;
        //     headerRow.appendChild(th);
        // });
        // thead.appendChild(headerRow);

        // // Table rows
        // data.forEach(item => {
        //     const row = document.createElement("tr");

        //     // Apply row class based on incidentStatus
        //     const statusClass = item.incidentStatus === "NEW" ? "row-new" : "row-default";
        //     row.classList.add(statusClass);

        //     headers.forEach(key => {
        //         const td = document.createElement("td");
        //         td.textContent = typeof item[key] === "object" ? JSON.stringify(item[key]) : item[key];
        //         row.appendChild(td);
        //     });
        //     tbody.appendChild(row);
        // });
    } catch (err) {
        console.error("Failed to fetch API:", err);
    }
}

// Initial load
loadTable();

// Auto-refresh every 5 seconds
setInterval(loadTable, 5000);
</script>

</body>
</html>
