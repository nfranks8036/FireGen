<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Incident</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #121212;
    color: #ffffff;
    padding: 20px;
    font-family: Arial, sans-serif;
}
.card {
    background-color: #1c1c1c;
    border: 1px solid #444;
    margin-bottom: 20px;
}
.info-label { color: #888; }
.table-dark-custom th { background-color: #444; }
.table-dark-custom td { color: #fff; }
.loc-fields.d-none { display:none; }
.dual-list {
    display:flex;
    gap:20px;
}
.list-box {
    flex:1;
    background:#181818;
    border:1px solid #444;
    min-height:300px;
    padding:10px;
    overflow-y:auto;
}
.list-item {
    padding:6px 10px;
    border-bottom:1px solid #333;
    cursor:pointer;
}
.list-item:hover { background:#2a2a2a; }
.status-badge {
    float:right;
    color:#0dcaf0;
    cursor:pointer;
}
.context-menu {
    position:absolute;
    background:#222;
    border:1px solid #555;
    z-index:9999;
}
.context-menu div {
    padding:5px 10px;
    cursor:pointer;
}
.context-menu div:hover { background:#333; }
.search-input {
    width:100%;
    margin-bottom:5px;
    background:#000;
    color:#fff;
    border:1px solid #555;
    padding:4px 6px;
}
</style>
</head>
<body>

<div class="container">

<!-- LOCATION -->
<div class="card">
<div class="card-body">
<h4>Location</h4>

<div class="row g-2 mb-3">
    <div class="col"><input type="radio" class="btn-check" name="locMode" id="loc-custom" value="CUSTOM" checked>
    <label class="btn btn-outline-light w-100" for="loc-custom">CUSTOM</label></div>
    <div class="col"><input type="radio" class="btn-check" name="locMode" id="loc-street" value="STREET">
    <label class="btn btn-outline-light w-100" for="loc-street">STREET</label></div>
    <div class="col"><input type="radio" class="btn-check" name="locMode" id="loc-mile" value="MILE">
    <label class="btn btn-outline-light w-100" for="loc-mile">MILE</label></div>
</div>

<div class="row g-2 loc-fields" data-mode="CUSTOM">
    <div class="col-12">
        <input class="form-control" id="shownValue" placeholder="Display Location">
    </div>
</div>

<div class="row g-2 loc-fields d-none" data-mode="STREET">
    <div class="col-md-3"><input class="form-control" id="streetNum" placeholder="1234"></div>
    <div class="col-md-9"><input class="form-control" id="streetName" placeholder="Main St"></div>
</div>

<div class="row g-2 loc-fields d-none" data-mode="MILE">
    <div class="col-md-8"><input class="form-control" id="mileRoad" placeholder="I-81 NB"></div>
    <div class="col-md-4"><input class="form-control" id="mileMarker" placeholder="123.4"></div>
</div>

<div class="mt-3">
    <label class="info-label">Common Name</label>
    <input class="form-control" id="commonName">
</div>

<div class="row mt-3">
    <div class="col-md-4">
        <label class="info-label">Venue</label>
        <input class="search-input" placeholder="Search..." oninput="filterSelect(this, venueSelect)">
        <select class="form-control" id="venueSelect"></select>
    </div>
    <div class="col-md-4">
        <label class="info-label">State</label>
        <input class="search-input" placeholder="Search..." oninput="filterSelect(this, stateSelect)">
        <select class="form-control" id="stateSelect"></select>
    </div>
    <div class="col-md-4">
        <label class="info-label">Zip</label>
        <input class="form-control" id="zipCode">
    </div>
</div>

<div class="mt-3">
    <label class="info-label">Cross Streets</label>
    <div id="crossContainer"></div>
    <button class="btn btn-sm btn-outline-secondary mt-1" onclick="addCross()">+ Add cross street</button>
</div>

</div>
</div>

<!-- INCIDENT META -->
<div class="card">
<div class="card-body">
<div class="row">
    <div class="col-md-4">
        <label class="info-label">Call Type</label>
        <input class="search-input" placeholder="Search..." oninput="filterSelect(this, callTypeSelect)">
        <select class="form-control" id="callTypeSelect"></select>
    </div>
    <div class="col-md-4">
        <label class="info-label">Incident Priority</label>
        <input class="search-input" placeholder="Search..." oninput="filterSelect(this, prioritySelect)">
        <select class="form-control" id="prioritySelect"></select>
    </div>
    <div class="col-md-4">
        <label class="info-label">Incident Source</label>
        <input class="search-input" placeholder="Search..." oninput="filterSelect(this, sourceSelect)">
        <select class="form-control" id="sourceSelect"></select>
    </div>
</div>

<div class="row mt-3">
    <div class="col-md-6">
        <label class="info-label">Incident Time</label>
        <div class="input-group">
            <input type="datetime-local" class="form-control" id="incidentTime">
            <button class="btn btn-outline-light" onclick="setNow()">NOW</button>
        </div>
    </div>
    <div class="col-md-6">
        <label class="info-label">Incident Number</label>
        <div class="form-control" id="incidentIdDisplay" style="background:#000;"></div>
    </div>
</div>
</div>
</div>

<!-- CALL LOG -->
<div class="card">
<div class="card-body">
<h4>Call Log <button class="btn btn-sm btn-outline-success" onclick="addNarrative()">+</button></h4>
<table class="table table-sm table-dark table-striped table-dark-custom">
<thead><tr><th>Time</th><th>Type</th><th>Narrative</th></tr></thead>
<tbody id="logBody"></tbody>
</table>
</div>
</div>

<!-- APPARATUS -->
<div class="card">
<div class="card-body">
<h4>Apparatus (<span id="unitCount">0</span>)</h4>
<div class="dual-list">
    <div class="list-box" id="onCallList" ondragover="event.preventDefault()" ondrop="onDropUnit(event)"></div>
    <div class="list-box" id="agencyList"></div>
</div>
</div>
</div>

</div>

<script>
const API = "http://localhost:8080/api/v1";
const params = new URLSearchParams(window.location.search);
const INCIDENT_ID = params.get("incident");
document.getElementById("incidentIdDisplay").innerText = INCIDENT_ID;

const venueSelect = document.getElementById("venueSelect");
const stateSelect = document.getElementById("stateSelect");
const callTypeSelect = document.getElementById("callTypeSelect");
const prioritySelect = document.getElementById("prioritySelect");
const sourceSelect = document.getElementById("sourceSelect");

function filterSelect(input, select) {
    const q = input.value.toLowerCase();
    [...select.options].forEach(o => {
        o.hidden = !o.text.toLowerCase().includes(q);
    });
}

function setNow() {
    document.getElementById("incidentTime").value = new Date().toISOString().slice(0,16);
    updateIncident({ created: new Date().toISOString() });
}

function addCross(val="") {
    const div = document.createElement("div");
    div.className = "input-group mb-1";
    div.innerHTML = `
        <input class="form-control" value="${val}">
        <button class="btn btn-outline-danger">X</button>
    `;
    div.querySelector("button").onclick = () => div.remove();
    document.getElementById("crossContainer").appendChild(div);
}

async function updateIncident(payload) {
    await fetch(`${API}/incidents/id/${INCIDENT_ID}`, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload)
    });
}

async function addNarrative() {
    const text = prompt("Narrative:");
    if (!text) return;
    await fetch(`${API}/incidents/id/${INCIDENT_ID}/add_narrative`, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ newNarrative: text })
    });
    loadIncident();
}

function showStatusMenu(e, unit) {
    e.preventDefault();
    document.querySelectorAll(".context-menu").forEach(m => m.remove());

    const menu = document.createElement("div");
    menu.className = "context-menu";
    menu.style.left = e.pageX+"px";
    menu.style.top = e.pageY+"px";

    fetch(`${API}/unit_statuses`).then(r=>r.json()).then(d=>{
        d.message.forEach(status=>{
            const opt = document.createElement("div");
            opt.innerText = status;
            opt.onclick = async ()=>{
                const narrative = prompt("Optional narrative:");
                const primary = confirm("Primary unit?");
                const radios = await fetch(`${API}/radio_channels`).then(r=>r.json());
                const radio = prompt("Operate radio:", radios.message[0]);

                await fetch(`${API}/units/${unit.abbr}/${unit.num}`, {
                    method:"PUT",
                    headers:{ "Content-Type":"application/json" },
                    body: JSON.stringify({
                        incident: INCIDENT_ID,
                        primary,
                        operate: radio,
                        new_status: status
                    })
                });
                menu.remove();
                loadIncident();
            };
            menu.appendChild(opt);
        });
    });

    document.body.appendChild(menu);
}

async function loadDropdowns() {
    const venues = await fetch(`${API}/venues`).then(r=>r.json());
    venues.message.forEach(v=>venueSelect.add(new Option(v, v)));

    const states = await fetch(`${API}/states`).then(r=>r.json());
    states.message.forEach(s=>stateSelect.add(new Option(s, s)));

    const types = await fetch(`${API}/incident_types`).then(r=>r.json());
    types.message.forEach(t=>callTypeSelect.add(new Option(t, t)));

    const sources = await fetch(`${API}/sources`).then(r=>r.json());
    sources.message.forEach(s=>{
        if (s==="NINE ONE ONE") s="911";
        sourceSelect.add(new Option(s, s.replaceAll(" ","_")));
    });
}

callTypeSelect.onchange = async ()=>{
    prioritySelect.innerHTML="";
    const type = callTypeSelect.value.replaceAll(" ","_");
    const p = await fetch(`${API}/priorities?type=${type}`).then(r=>r.json());
    p.message.forEach(x=>prioritySelect.add(new Option(x, x)));
    updateIncident({ incidentType: type });
};

prioritySelect.onchange = ()=> updateIncident({ incidentPriority: prioritySelect.value });
sourceSelect.onchange = ()=> updateIncident({ incidentSource: sourceSelect.value });
venueSelect.onchange = ()=> updateIncident({ location:{ venue: venueSelect.value }});
stateSelect.onchange = ()=> updateIncident({ location:{ state: stateSelect.value }});
document.getElementById("zipCode").onchange = e=> updateIncident({ location:{ zipCode: e.target.value }});
document.getElementById("commonName").onchange = e=> updateIncident({ location:{ commonName: e.target.value }});
document.getElementById("shownValue").onchange = e=> updateIncident({ location:{ shownValue: e.target.value }});
document.getElementById("incidentTime").onchange = e=> updateIncident({ created: new Date(e.target.value).toISOString() });

async function loadIncident() {
    const res = await fetch(`${API}/incidents/id/${INCIDENT_ID}`).then(r=>r.json());
    const inc = res.message;

    document.getElementById("shownValue").value = inc.location.shownValue || "";
    document.getElementById("commonName").value = inc.location.commonName || "";
    document.getElementById("zipCode").value = inc.location.zipCode || "";
    document.getElementById("incidentTime").value = inc.created?.slice(0,16) || "";

    venueSelect.value = inc.location.venue || "";
    stateSelect.value = inc.location.state || "";
    callTypeSelect.value = inc.incidentType.replaceAll("_"," ");
    sourceSelect.value = inc.incidentSource.replaceAll("_"," ");

    const cross = document.getElementById("crossContainer");
    cross.innerHTML="";
    (inc.location.crossStreets||[]).forEach(c=>addCross(c));

    const logBody = document.getElementById("logBody");
    logBody.innerHTML="";
    inc.log.forEach(l=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${l.time}</td><td>${l.logType}</td><td>${l.text}</td>`;
        logBody.appendChild(tr);
    });

    const onCall = document.getElementById("onCallList");
    onCall.innerHTML="";
    inc.units.forEach(u=>{
        const div = document.createElement("div");
        div.className="list-item";
        div.innerHTML = `${u.unit} <span class="status-badge">${u.events.at(-1)?.status || ""}</span>`;
        div.oncontextmenu = e => showStatusMenu(e, {
            abbr: u.unit.split("")[0],
            num: u.unit.replace(/\D/g,"")
        });
        onCall.appendChild(div);
    });
    document.getElementById("unitCount").innerText = inc.units.length;
}

async function loadAgencies() {
    const res = await fetch(`${API}/agencies`).then(r=>r.json());
    const list = document.getElementById("agencyList");
    list.innerHTML="";
    res.message.forEach(a=>{
        a.units.forEach(u=>{
            const div = document.createElement("div");
            div.className="list-item";
            div.draggable=true;
            div.innerText = u.callsign;
            div.ondragstart = e=>{
                e.dataTransfer.setData("text/plain", JSON.stringify({
                    abbr: a.abbreviation,
                    num: u.unitNumber
                }));
            };
            list.appendChild(div);
        });
    });
}

async function onDropUnit(e) {
    const data = JSON.parse(e.dataTransfer.getData("text/plain"));
    await fetch(`${API}/units/${data.abbr}/${data.num}`, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            incident: INCIDENT_ID,
            primary:false,
            operate:"",
            new_status:"ASSIGNED"
        })
    });
    loadIncident();
}

document.querySelectorAll('input[name="locMode"]').forEach(r=>{
    r.onchange = ()=>{
        document.querySelectorAll(".loc-fields").forEach(f=>{
            f.classList.toggle("d-none", f.dataset.mode !== r.value);
        });
    };
});

(async function init(){
    await loadDropdowns();
    await loadAgencies();
    await loadIncident();
    setInterval(loadIncident, 5000);
})();
</script>

</body>
</html>
