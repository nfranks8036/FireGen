<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404: Page Not Found</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --accent: #3b82f6;
  --text: #f1f5f9;
  --muted: #94a3b8;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 2rem;
  margin-bottom: 20px;
}

p {
  color: var(--muted);
  margin-bottom: 30px;
}

.button {
  background: var(--card);
  color: var(--text);
  padding: 12px 24px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 500;
  border: 1px solid transparent;
  transition: 0.2s ease;
}

.button:hover {
  transform: translateY(-2px);
  border: 1px solid var(--accent);
  background: #273449;
}
</style>
</head>
<body>

<h1>404: Page Not Found :(</h1>
<p>The page you are looking for doesn’t exist.</p>
<a href="/" class="button">Home</a>

</body>
</html>
